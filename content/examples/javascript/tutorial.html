<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /></head>
<body>
<script src="../../../../../../gpudb-api-javascript/javascript/GPUdb.js"> </script>
<script src="tutorial.js"> </script>
<script>
function tutor()
{
	const url = test_input.url.value;
	const user = test_input.user.value;
	const pass = test_input.pass.value;

	main(url, user, pass);
}
</script>
<h1>Tutorial</h1>
<form name="test_input" onSubmit="event.preventDefault(); tutor();">
	<h2>Enter Parameters</h2>
	<table>
		<tr><td>URL</td><td><input name="url" value="http://localhost:9191"></td></tr>
		<tr><td>Username</td><td><input name="user" value="admin"></td></tr>
		<tr><td>Password</td><td><input type="password" name="pass"></td></tr>
		<tr><td colspan=2 align="center"><br/><button>Run Tutorial</button></td></tr>
	</table>
</form>
</body>
</html>
